# ============================================================================
# NMS Agent Bootstrap Configuration
#
# This is the minimal config needed to enroll and run the agent.
# Sensitive values support ${ENV_VAR} expansion — prefer environment variables
# over plain-text secrets in this file.
# ============================================================================

agent:
  # id: leave empty on first boot; the server assigns one during enrollment.
  # After enrollment the agent reads its ID from .certs/agent_id.
  id: ""
  region: "HKG"
  tags:
    role: "edge"
    datacenter: "DC1"
    provider: "equinix"
  # hostname_override: if empty the agent uses os.Hostname() during enrollment.
  hostname_override: ""

server:
  # enroll_url: single-way HTTPS endpoint used once on first boot.
  enroll_url: "https://nms.example.com:8443"
  # report_url: mTLS sync endpoint for task polling and result upload.
  report_url: "https://nms.example.com:8444"
  # provisioning_token: one-time token obtained from the NMS admin UI.
  # After the agent enrolls and receives its certificate, this field is
  # no longer used and can be left empty or removed.
  provisioning_token: "${NMS_TOKEN}"
  # insecure_enroll: set true only if the enroll endpoint uses a self-signed
  # certificate that the agent cannot verify during its first connection.
  # The mTLS sync channel always performs full certificate verification.
  insecure_enroll: false
  # task_poll_interval: how often to fetch the task list from the server.
  task_poll_interval: "30s"
  # flush_interval: maximum time between result upload batches.
  flush_interval: "30s"
  # batch_size: upload a batch as soon as this many results are buffered.
  batch_size: 100
  # request_timeout: HTTP request timeout for both task fetch and result upload.
  request_timeout: "30s"

runtime:
  log:
    # file: path to the log file; leave empty to write to stderr.
    # Use an absolute path to avoid resolution issues when the working directory
    # differs from the install location (e.g. when running via systemd or nohup).
    file: "logs/nms-agent.log"
    # level: log verbosity — debug / info / warn / error (default info).
    level: "info"
    # max_size_mb: rotate when the file reaches this size (lumberjack).
    max_size_mb: 100
    # max_age_days: delete rotated files older than this many days.
    max_age_days: 30
    # max_backups: keep at most this many rotated log files.
    max_backups: 30
    # compress: gzip-compress rotated files.
    compress: true
  # grace_period: time to wait for in-flight probes and uploads to finish
  # after receiving SIGINT/SIGTERM.
  grace_period: "30s"
  # max_concurrency: maximum number of probe executions running concurrently.
  max_concurrency: 20

certs:
  # dir: directory where mTLS credentials are stored after enrollment.
  # Contains: ca.crt, client.crt, client.key, agent_id
  dir: ".certs"
